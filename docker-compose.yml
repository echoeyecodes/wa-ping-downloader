services:
  ping:
    build: .
    image: ping
    # Config + cookies come from .env (PING_DMS, PING_GROUPS, GALLERY_DL_COOKIES_B64).
    env_file: .env
    volumes:
      # WhatsApp session — keep this so you don't re-pair on every restart.
      - ./.wa-auth:/app/.wa-auth
      # Downloaded files on the host.
      - ./downloads:/app/downloads
    restart: unless-stopped
