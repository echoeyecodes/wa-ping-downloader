name: Build & Deploy Production

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: build-deploy-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ping
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ping
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ping
          cache-to: type=gha,mode=max,scope=ping

      - name: Trigger Coolify redeploy
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          UUID: ${{ secrets.COOLIFY_PING_UUID }}
        run: |
          : "${COOLIFY_BASE_URL:?COOLIFY_BASE_URL is empty. Add it under the production environment}"
          : "${COOLIFY_API_TOKEN:?COOLIFY_API_TOKEN is empty. Add it under the production environment}"
          : "${UUID:?COOLIFY_PING_UUID is empty. Add it under the production environment}"
          curl --fail-with-body -sS -X GET \
            "${COOLIFY_BASE_URL%/}/api/v1/deploy?uuid=${UUID}&force=true" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}"
