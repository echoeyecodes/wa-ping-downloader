name: Build & Deploy Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: build-deploy-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  NAMESPACE: ghcr.io/echoeyecodes

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ping
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.NAMESPACE }}/ping:latest
            ${{ env.NAMESPACE }}/ping:${{ github.sha }}
          cache-from: type=gha,scope=ping
          cache-to: type=gha,mode=max,scope=ping

      - name: Trigger Coolify redeploy
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          UUID: ${{ secrets.COOLIFY_PING_UUID }}
        run: |
          : "${COOLIFY_BASE_URL:?COOLIFY_BASE_URL is empty. Add it under the production environment}"
          : "${COOLIFY_API_TOKEN:?COOLIFY_API_TOKEN is empty. Add it under the production environment}"
          : "${UUID:?COOLIFY_PING_UUID is empty. Add it under the production environment}"
          curl --fail-with-body -sS -X GET \
            "${COOLIFY_BASE_URL%/}/api/v1/deploy?uuid=${UUID}&force=true" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}"
